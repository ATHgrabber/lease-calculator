<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リース料金 計算ツール — Advisory Japan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060d1a}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#3b82f6;border:3px solid #060d1a;box-shadow:0 0 0 2px #3b82f6;cursor:pointer;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25)}
.qb:hover{background:rgba(52,211,153,.2)!important;transform:translateY(-1px)}
.pb:hover{background:rgba(59,130,246,.25)!important;transform:translateY(-1px)}
input:focus,textarea:focus{border-color:#2563eb!important;box-shadow:0 0 0 2px rgba(37,99,235,.15);outline:none}
@media print{
  .np{display:none!important}
  body{background:white!important}
  .qp{box-shadow:none!important;margin:0!important;border-radius:0!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:10mm}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback}=React;
const fY=(n)=>n<0?`▲ ¥${Math.abs(Math.round(n)).toLocaleString()}`:`¥${Math.round(n).toLocaleString()}`;
const RR={1:.92,2:.85,3:.78,4:.70,5:.63,6:.56,7:.50,8:.45,9:.41,10:.37};
const MO=[
  {km:3000,label:"3,000km",rb:.12,dr:.15},
  {km:5000,label:"5,000km",rb:.09,dr:.11},
  {km:8000,label:"8,000km",rb:.05,dr:.06},
  {km:10000,label:"10,000km",rb:.02,dr:.02},
  {km:15000,label:"15,000km（標準）",rb:.00,dr:.00},
  {km:20000,label:"20,000km",rb:-.04,dr:-.04},
  {km:30000,label:"30,000km",rb:-.10,dr:-.08},
];
const IS={3:120000,5:80000,7:120000,9:80000};
function QV({r,params,onBack}){
  const [cn,setCn]=useState("");
  const [vn,setVn]=useState("");
  const [sn,setSn]=useState("");
  const [nt,setNt]=useState("");
  const today=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"});
  const ml=MO[params.mi];
  const iS={border:"1px solid #d1d5db",borderRadius:6,padding:"7px 12px",fontSize:13,width:"100%",fontFamily:"inherit",color:"#1f2937",background:"white"};
  const lS={fontSize:11,color:"#6b7280",marginBottom:3,display:"block",fontWeight:600};
  return(
    <div style={{minHeight:"100vh",background:"#f3f4f6",fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif"}}>
      <div className="np" style={{background:"#1e293b",padding:"10px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"1px solid #475569",color:"#94a3b8",padding:"7px 14px",borderRadius:6,cursor:"pointer",fontSize:13}}>← 計算ツールに戻る</button>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{color:"#64748b",fontSize:13}}>入力後、PDF出力してください</span>
          <button onClick={()=>window.print()} style={{background:"#2563eb",border:"none",color:"white",padding:"8px 20px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600}}>📄 PDF出力</button>
        </div>
      </div>
      <div className="np" style={{maxWidth:760,margin:"12px auto",background:"white",borderRadius:10,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:12}}>📝 見積書情報の入力</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:10}}>
          <div><label style={lS}>お客様名</label><input style={iS} value={cn} onChange={e=>setCn(e.target.value)} placeholder="例：山田 太郎 様"/></div>
          <div><label style={lS}>車両名・グレード</label><input style={iS} value={vn} onChange={e=>setVn(e.target.value)} placeholder="例：アルファード Z Grade"/></div>
          <div><label style={lS}>担当者名</label><input style={iS} value={sn} onChange={e=>setSn(e.target.value)} placeholder="例：Advisory Japan 鈴木"/></div>
        </div>
        <div><label style={lS}>備考</label><textarea style={{...iS,height:44,resize:"vertical"}} value={nt} onChange={e=>setNt(e.target.value)} placeholder="例：ご不明点はお気軽にお問い合わせください。"/></div>
      </div>
      <div className="qp" style={{maxWidth:760,margin:"0 auto 20px",background:"white",borderRadius:10,boxShadow:"0 2px 12px rgba(0,0,0,.1)",overflow:"hidden"}}>
        <div style={{background:"#1e293b",padding:"20px 32px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <div style={{fontSize:10,color:"#94a3b8",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:4}}>Advisory Japan — Vehicle Leasing</div>
            <div style={{fontSize:24,fontWeight:700,color:"white"}}>お見積書</div>
          </div>
          <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#94a3b8"}}>発行日</div><div style={{fontSize:13,color:"white",fontWeight:500}}>{today}</div></div>
        </div>
        <div style={{padding:"16px 32px",borderBottom:"1px solid #e5e7eb",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#9ca3af",marginBottom:2}}>お客様</div>
            <div style={{fontSize:18,fontWeight:700,color:"#111827"}}>{cn||"　　　　　　　　　　"}</div>
            {vn&&<div style={{fontSize:12,color:"#6b7280",marginTop:2}}>対象車両：{vn}</div>}
          </div>
          {sn&&<div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#9ca3af",marginBottom:1}}>担当</div><div style={{fontSize:13,color:"#374151"}}>{sn}</div></div>}
        </div>
        <div style={{padding:"20px 32px",background:"#f8fafc",borderBottom:"1px solid #e5e7eb",display:"flex",alignItems:"center",gap:32}}>
          <div>
            <div style={{fontSize:11,color:"#6b7280",fontWeight:600,marginBottom:4}}>月額リース料（消費税別）</div>
            <div style={{display:"flex",alignItems:"baseline",gap:8}}>
              <div style={{fontSize:46,fontWeight:800,color:"#1e293b",lineHeight:1}}>{fY(r.lm)}</div>
              <div style={{fontSize:16,color:"#64748b"}}>/ 月</div>
            </div>
          </div>
          <div style={{flex:1,borderLeft:"1px solid #e2e8f0",paddingLeft:24}}>
            {r.stp>0&&<div style={{fontSize:12,color:"#854d0e",marginBottom:4}}>※ 短期契約割増（{params.y}年）▲ {fY(r.stp)}/月 含む</div>}
            {r.md>0&&<div style={{fontSize:12,color:"#166534",marginBottom:4}}>※ 走行距離割引（{ml.label}）▼ {fY(r.md)}/月 適用</div>}
            {r.dp>0&&<div style={{fontSize:12,color:"#1d4ed8"}}>※ 頭金 {fY(r.dp)} 適用済</div>}
            {!r.stp&&!r.md&&!r.dp&&<div style={{fontSize:12,color:"#9ca3af"}}>標準条件での試算</div>}
          </div>
        </div>
        <div style={{padding:"16px 32px",borderBottom:"1px solid #e5e7eb"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10,paddingBottom:6,borderBottom:"2px solid #1e293b"}}>リース条件</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            {[{l:"車両価格（本体）",v:fY(params.cp)},{l:"リース期間",v:`${params.y}年（${r.mo}ヶ月）`},{l:"年間走行距離上限",v:ml.label},{l:"残価率",v:`${(r.rr*100).toFixed(0)}%（${fY(r.rv)}）`},{l:"頭金",v:params.dp>0?fY(params.dp):"なし"},{l:"初期登録費用",v:fY(params.reg)}].map(({l,v})=>(
              <div key={l} style={{padding:"7px 10px",background:"#f8fafc",borderRadius:6,border:"1px solid #e5e7eb"}}>
                <div style={{fontSize:10,color:"#9ca3af",marginBottom:2}}>{l}</div>
                <div style={{fontSize:12,color:"#111827",fontWeight:600}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{padding:"16px 32px",borderBottom:"1px solid #e5e7eb",display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:8,paddingBottom:5,borderBottom:"2px solid #1e293b"}}>お客様ご負担費用</div>
            <div style={{fontSize:11,color:"#6b7280",lineHeight:1.9}}>
              ・ 自動車保険（任意・車両保険込み推奨）<br/>
              ・ タイヤ・オイル等の消耗品<br/>
              ・ ガソリン・充電費用<br/>
              ・ 駐車場代・洗車費用<br/>
              ・ 違反罰金・事故費用
            </div>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:8,paddingBottom:5,borderBottom:"2px solid #1e293b"}}>月額に含まれるもの（貸主負担）</div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:6,padding:"6px 10px"}}>
                <div style={{fontSize:12,color:"#166534",fontWeight:500}}>✅ 車検費用</div>
                <div style={{fontSize:10,color:"#4ade80"}}>3・5・7・9年目（計{fY(r.ti)}）</div>
              </div>
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:6,padding:"6px 10px"}}>
                <div style={{fontSize:12,color:"#166534",fontWeight:500}}>✅ 法定点検・修理費積立</div>
                <div style={{fontSize:10,color:"#4ade80"}}>年間積立 {fY(params.ar)}</div>
              </div>
            </div>
          </div>
        </div>
        {nt&&<div style={{padding:"12px 32px",borderBottom:"1px solid #e5e7eb"}}><span style={{fontSize:11,fontWeight:700,color:"#374151"}}>備考：</span><span style={{fontSize:12,color:"#4b5563",marginLeft:8}}>{nt}</span></div>}
        <div style={{padding:"14px 32px",background:"#f8fafc"}}>
          <div style={{fontSize:10,color:"#9ca3af",lineHeight:1.8}}>※ 本見積書の金額は参考値です。残価率は中古車市場の一般的な参考値に基づき試算しています。消費税は別途申し受けます。金利・損害保険料は含まれておりません。正式なご契約の際は別途契約書をご確認ください。</div>
          <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #e5e7eb",display:"flex",justifyContent:"space-between"}}>
            <div style={{fontSize:10,color:"#9ca3af"}}>Advisory Japan Vehicle Leasing</div>
            <div style={{fontSize:10,color:"#9ca3af"}}>発行：{today}</div>
          </div>
        </div>
      </div>
    </div>
  );
}
function App(){
  const [cp,setCp]=useState(2000000);
  const [y,setY]=useState(10);
  const [mr,setMr]=useState(8);
  const [ar,setAr]=useState(50000);
  const [reg,setReg]=useState(80000);
  const [mi,setMi]=useState(4);
  const [dp,setDp]=useState(0);
  const [sq,setSq]=useState(false);
  const calc=useCallback(()=>{
    const mo=y*12,ml=MO[mi],brr=RR[y]??0.20;
    const rr=Math.min(.95,Math.max(.10,brr+ml.rb));
    const rv=cp*rr,dt=cp-rv,dm=dt/mo;
    let ti=0;Object.entries(IS).forEach(([yr,c])=>{if(parseInt(yr)<=y)ti+=c;});
    const im=ti/mo,rm=ar/12,regm=reg/mo,cm=dm+im+rm+regm;
    const pm=cm*(mr/100),md=cm*ml.dr,dpm=dp/mo;
    const STP={1:.25,2:.18,3:.12,4:.07,5:.04,6:.02,7:.01,8:0,9:0,10:0};
    const stp=cm*(STP[y]??0);
    const lm=Math.max(0,cm+pm+stp-md-dpm);
    const tc=lm*mo,sf=.85+(ml.rb*.3);
    const sp=rv*Math.min(.95,Math.max(.70,sf));
    const tlc=cp+reg+ti,tr=tc+sp,np=tr-tlc,roi=(np/tlc)*100;
    return{mo,ml,rr,rv,dt,dm,im,rm,regm,cm,pm,stp,md,dpm,dp,lm,tc,sp,ti,tlc,tr,np,roi};
  },[cp,y,mr,ar,reg,mi,dp]);
  const r=calc();
  if(sq)return <QV r={{lm:r.lm,stp:r.stp,md:r.md,dp:r.dp,rr:r.rr,rv:r.rv,mo:r.mo,ti:r.ti}} params={{cp,y,ar,reg,dp,mi}} onBack={()=>setSq(false)}/>;
  const SR=({label,value,setValue,min,max,step,fmt,sub})=>(
    <div style={{marginBottom:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
        <span style={{fontSize:13,color:"#8a9bb0",letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>{label}</span>
        <span style={{fontSize:22,fontWeight:700,color:"#e2eaf5",fontFamily:"'Syne',sans-serif"}}>{fmt(value)}</span>
      </div>
      {sub&&<div style={{fontSize:11,color:"#5a6a7a",marginBottom:8}}>{sub}</div>}
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>setValue(Number(e.target.value))}
        style={{background:`linear-gradient(to right,#3b82f6 0%,#3b82f6 ${((value-min)/(max-min))*100}%,#1e3050 ${((value-min)/(max-min))*100}%,#1e3050 100%)`}}/>
    </div>
  );
  const Row=({label,value,border})=>(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:border?"1px solid #1e3050":"none"}}>
      <span style={{fontSize:12.5,color:"#6b7f96"}}>{label}</span>
      <span style={{fontSize:14,color:"#8a9bb0",fontFamily:"'DM Mono',monospace"}}>{value}</span>
    </div>
  );
  const pc=r.np>=0?"#34d399":"#f87171";
  return(
    <div style={{minHeight:"100vh",background:"#060d1a",fontFamily:"'DM Sans',sans-serif",padding:"0 0 60px 0",color:"#c8d8ea"}}>
      <div style={{background:"linear-gradient(180deg,#0a1628 0%,#060d1a 100%)",borderBottom:"1px solid #1a2d4a",padding:"36px 24px 28px",marginBottom:32}}>
        <div style={{maxWidth:720,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:10,letterSpacing:"0.2em",color:"#3b82f6",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:10}}>Advisory Japan — Vehicle Leasing</div>
            <h1 style={{fontSize:28,fontWeight:800,color:"#e8f1fb",fontFamily:"'Syne',sans-serif",margin:0,letterSpacing:"-0.02em"}}>リース料金 計算ツール</h1>
            <p style={{fontSize:13,color:"#4a6080",marginTop:8,lineHeight:1.6}}>車検・修理：貸主負担 ／ 消耗品・保険：借主負担 ／ 売却益で利益回収</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
            <button className="qb np" onClick={()=>setSq(true)} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 20px",background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.4)",borderRadius:10,color:"#34d399",fontSize:13,fontFamily:"'DM Mono',monospace",cursor:"pointer",letterSpacing:"0.05em",whiteSpace:"nowrap",transition:"all .2s"}}>📋 見積書を作成</button>
            <button className="pb np" onClick={()=>window.print()} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 20px",background:"rgba(59,130,246,.12)",border:"1px solid rgba(59,130,246,.4)",borderRadius:10,color:"#93c5fd",fontSize:13,fontFamily:"'DM Mono',monospace",cursor:"pointer",letterSpacing:"0.05em",whiteSpace:"nowrap",transition:"all .2s"}}>🖨 PDF出力</button>
          </div>
        </div>
      </div>
      <div style={{maxWidth:720,margin:"0 auto",padding:"0 20px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div style={{background:"#0b1929",border:"1px solid #1a2d4a",borderRadius:16,padding:"28px 24px"}}>
            <div style={{fontSize:10,letterSpacing:"0.15em",color:"#3b82f6",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:24}}>パラメーター設定</div>
            <div style={{marginBottom:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
        <span style={{fontSize:13,color:"#8a9bb0",letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>車両価格</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <input type="number" value={cp} min={500000} max={30000000} step={10000}
            onChange={e=>{const v=Math.min(30000000,Math.max(500000,Number(e.target.value)||500000));setCp(v);}}
            style={{width:120,fontSize:16,fontWeight:700,color:"#e2eaf5",background:"#0d1f35",border:"1px solid #2a4a70",borderRadius:6,padding:"4px 8px",textAlign:"right",fontFamily:"'DM Mono',monospace",outline:"none"}}/>
          <span style={{fontSize:16,color:"#8a9bb0",fontFamily:"'DM Mono',monospace"}}>円</span>
        </div>
      </div>
      <div style={{fontSize:11,color:"#5a6a7a",marginBottom:8}}>新車購入価格（登録費除く）</div>
      <input type="range" min={500000} max={30000000} step={50000} value={cp} onChange={e=>setCp(Number(e.target.value))}
        style={{width:"100%",height:4,borderRadius:2,outline:"none",cursor:"pointer",background:`linear-gradient(to right,#3b82f6 0%,#3b82f6 ${((cp-500000)/(30000000-500000))*100}%,#1e3050 ${((cp-500000)/(30000000-500000))*100}%,#1e3050 100%)`}}/>
    </div>
            <SR label="リース期間" value={y} setValue={setY} min={1} max={10} step={1} fmt={v=>`${v}年`} sub={`基準残価率：${(RR[y]*100).toFixed(0)}%（距離補正前）`}/>
            <SR label="月次マージン" value={mr} setValue={setMr} min={0} max={20} step={0.5} fmt={v=>`${v}%`} sub="原価に上乗せする利益率（最小化推奨）"/>
            <SR label="年間修理予算" value={ar} setValue={setAr} min={0} max={300000} step={10000} fmt={v=>`¥${(v/10000).toFixed(0)}万`} sub="貸主負担の修理積立（車検除く）"/>
            <SR label="初期登録費用" value={reg} setValue={setReg} min={0} max={200000} step={5000} fmt={v=>`¥${v.toLocaleString()}`} sub="ナンバー取得・登録諸費用"/>
            <SR label="頭金" value={dp} setValue={setDp} min={0} max={cp*.5} step={10000} fmt={v=>v===0?"なし":`¥${(v/10000).toFixed(0)}万`} sub={dp>0?`月額から ▼${fY(dp/(y*12))} 減額`:"頭金なし（月額に全額反映）"}/>
            <div style={{marginBottom:28}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                <span style={{fontSize:13,color:"#8a9bb0",letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>年間走行距離上限</span>
                <span style={{fontSize:18,fontWeight:700,color:r.ml.dr>0?"#34d399":r.ml.dr<0?"#f87171":"#e2eaf5",fontFamily:"'Syne',sans-serif"}}>{r.ml.dr>0?`▼ ${(r.ml.dr*100).toFixed(0)}%割引`:r.ml.dr<0?`▲ ${(Math.abs(r.ml.dr)*100).toFixed(0)}%割増`:"標準"}</span>
              </div>
              <div style={{fontSize:11,color:"#5a6a7a",marginBottom:10}}>距離が少ないほど残価↑・月額割引　補正後残価率: <span style={{color:"#7cb8ff"}}>{(r.rr*100).toFixed(0)}%</span></div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {MO.map((o,i)=>(
                  <button key={i} onClick={()=>setMi(i)} style={{padding:"8px 4px",borderRadius:8,border:"1px solid",borderColor:mi===i?"#3b82f6":"#1a2d4a",background:mi===i?"rgba(59,130,246,.15)":"#091525",color:mi===i?"#93c5fd":"#4a6080",fontSize:10,fontFamily:"'DM Mono',monospace",cursor:"pointer",transition:"all .15s",lineHeight:1.4,textAlign:"center"}}>
                    {o.label.replace("（標準）","")}
                    {o.km===15000&&<div style={{fontSize:8,color:"#3b82f6",marginTop:2}}>標準</div>}
                  </button>
                ))}
              </div>
            </div>
            <div style={{padding:"14px 16px",background:"#0a1929",borderRadius:10,border:"1px solid #152338"}}>
              <div style={{fontSize:10,letterSpacing:"0.12em",color:"#4a6080",textTransform:"uppercase",marginBottom:10,fontFamily:"'DM Mono',monospace"}}>車検スケジュール（貸主負担）</div>
              {Object.entries(IS).map(([yr,c])=>(
                <div key={yr} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",opacity:parseInt(yr)<=y?1:.3}}>
                  <span style={{fontSize:12,color:"#4a6080"}}>{yr}年目</span>
                  <span style={{fontSize:12,color:parseInt(yr)<=y?"#7cb8ff":"#333",fontFamily:"'DM Mono',monospace"}}>¥{c.toLocaleString()}</span>
                </div>
              ))}
              <div style={{borderTop:"1px solid #1a2d4a",marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:11,color:"#4a6080"}}>期間合計</span>
                <span style={{fontSize:12,color:"#7cb8ff",fontFamily:"'DM Mono',monospace"}}>¥{r.ti.toLocaleString()}</span>
              </div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"linear-gradient(135deg,#0d2040 0%,#0a1628 100%)",border:"1px solid #2a4a70",borderRadius:16,padding:"28px 24px",textAlign:"center"}}>
              <div style={{fontSize:10,letterSpacing:"0.15em",color:"#3b82f6",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:12}}>月額リース料（借主）</div>
              <div style={{fontSize:42,fontWeight:800,color:"#e8f1fb",fontFamily:"'Syne',sans-serif",letterSpacing:"-0.02em",lineHeight:1}}>{fY(r.lm)}</div>
              <div style={{fontSize:12,color:"#3b6090",marginTop:8}}>/ 月 （消費税別）</div>
              <div style={{marginTop:20,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[{l:"減価償却",v:r.dm},{l:"車検積立",v:r.im},{l:"修理積立",v:r.rm},{l:"登録費按分",v:r.regm}].map(({l,v})=>(
                  <div key={l} style={{background:"#091525",borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:9,color:"#3a5060",textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'DM Mono',monospace"}}>{l}</div>
                    <div style={{fontSize:13,color:"#7090a0",fontFamily:"'DM Mono',monospace",marginTop:3}}>{fY(v)}</div>
                  </div>
                ))}
              </div>
              {r.stp>0&&<div style={{marginTop:10,padding:"10px 14px",borderRadius:8,background:"rgba(251,191,36,.07)",border:"1px solid rgba(251,191,36,.2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:"#fbbf24",fontFamily:"'DM Mono',monospace"}}>短期割増（{y}年契約）</span><span style={{fontSize:13,fontWeight:600,color:"#fbbf24"}}>▲ {fY(r.stp)}</span></div>}
              {r.dp>0&&<div style={{marginTop:10,padding:"10px 14px",borderRadius:8,background:"rgba(59,130,246,.07)",border:"1px solid rgba(59,130,246,.2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:"#93c5fd",fontFamily:"'DM Mono',monospace"}}>頭金按分（{fY(r.dp)}）</span><span style={{fontSize:13,fontWeight:600,color:"#93c5fd"}}>▼ {fY(r.dpm)}</span></div>}
              {r.md!==0&&<div style={{marginTop:10,padding:"10px 14px",borderRadius:8,background:r.md>0?"rgba(52,211,153,.07)":"rgba(248,113,113,.07)",border:`1px solid ${r.md>0?"rgba(52,211,153,.2)":"rgba(248,113,113,.2)"}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,color:r.md>0?"#34d399":"#f87171",fontFamily:"'DM Mono',monospace"}}>走行距離割引（{r.ml.label}）</span><span style={{fontSize:13,fontWeight:600,color:r.md>0?"#34d399":"#f87171"}}>{r.md>0?`▼ ${fY(r.md)}`:`▲ ${fY(Math.abs(r.md))}`}</span></div>}
            </div>
            <div style={{background:"#0b1929",border:"1px solid #1a2d4a",borderRadius:16,padding:"20px 20px"}}>
              <div style={{fontSize:10,letterSpacing:"0.15em",color:"#3b82f6",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:16}}>貸主 収支サマリー</div>
              <Row label="初期投資総額" value={fY(r.tlc)} border/>
              <Row label={`リース回収（${r.mo}ヶ月）`} value={fY(r.tc)} border/>
              <Row label={`売却益（残価${(r.rr*100).toFixed(0)}%×査定率）`} value={fY(r.sp)} border/>
              <Row label="総収益" value={fY(r.tr)} border/>
              <div style={{marginTop:16,padding:"16px",borderRadius:12,background:r.np>=0?"rgba(52,211,153,.06)":"rgba(248,113,113,.06)",border:`1px solid ${r.np>=0?"rgba(52,211,153,.2)":"rgba(248,113,113,.2)"}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:10,color:pc,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>純利益</div><div style={{fontSize:11,color:"#3a5060",marginTop:2}}>ROI: {r.roi.toFixed(1)}%</div></div>
                <div style={{fontSize:26,fontWeight:700,color:pc,fontFamily:"'Syne',sans-serif"}}>{fY(r.np)}</div>
              </div>
            </div>
            <div style={{background:"#0b1929",border:"1px solid #1a2d4a",borderRadius:16,padding:"20px 20px"}}>
              <div style={{fontSize:10,letterSpacing:"0.15em",color:"#3b82f6",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:14}}>残価・返却時</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[{l:"残価（帳簿上）",v:fY(r.rv)},{l:"査定売却益",v:fY(r.sp)},{l:"減価総額",v:fY(r.dt)},{l:"月次マージン計",v:fY(r.pm*r.mo)}].map(({l,v})=>(
                  <div key={l} style={{background:"#091525",borderRadius:8,padding:"12px 14px"}}>
                    <div style={{fontSize:9,color:"#3a5060",textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{l}</div>
                    <div style={{fontSize:14,color:"#7090a0",fontFamily:"'DM Mono',monospace"}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{padding:"12px 16px",background:"#080f1c",borderRadius:10,border:"1px solid #111e30"}}>
              <div style={{fontSize:10,color:"#2a4060",lineHeight:1.7}}>※ 残価率は中古車市場の一般的な参考値。査定売却益は残価の85%で試算。<br/>※ 消耗品・自動車保険は借主負担。消費税は別途。金利・損保含まず。</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
